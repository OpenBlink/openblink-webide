name: WASM Build

on:
  push:
    branches: [main]
    paths:
      - "Makefile"
      - "mruby_build_config.rb"
      - "src/**"
      - "vendor/mruby"
      - "vendor/mrubyc"
      - "vendor/emsdk"
      - ".gitmodules"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wasm-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v16
        with:
          version: 5.0.7

      - name: Verify Emscripten
        run: emcc --version

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Build WebAssembly artifacts
        run: make all

      - name: Verify output
        run: |
          ls -la public_html/mrbc/mrbc.js public_html/mrbc/mrbc.wasm
          ls -la public_html/mrubyc/mrubyc.js public_html/mrubyc/mrubyc.wasm

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: openblink-webide-wasm
          path: |
            public_html/mrbc/mrbc.js
            public_html/mrbc/mrbc.wasm
            public_html/mrubyc/mrubyc.js
            public_html/mrubyc/mrubyc.wasm
          retention-days: 30
